name: Build Bank Empire

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm install
      - name: Run production build
        id: production_build
        shell: bash
        run: |
          set +e
          npm run build > build.log 2>&1
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-build-log
          path: build.log
      - name: Verify production build
        shell: bash
        run: |
          cat build.log
          exit ${{ steps.production_build.outputs.exit_code }}
